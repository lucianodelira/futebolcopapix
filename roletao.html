<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎰 Roleta Premiada</title>

<style>

body{
margin:0;
background:#0d0d0d;
font-family:Arial;
text-align:center;
color:white;
overflow-x:hidden;
}

#app{
max-width:420px;
margin:auto;
padding:15px;
}

h1{
color:#ffd700;
margin:10px 0;
text-shadow:0 0 10px #ffd700;
}

#saldoArea{
display:flex;
justify-content:space-around;
margin:15px 0;
font-size:20px;
}

.credito-box{
background:#222;
padding:10px 20px;
border-radius:10px;
border:2px solid #444;
}

.credito{color:#00ff9c;font-weight:bold;}
.premio{color:#ffcc00;font-weight:bold;}

.roletaBox{
position:relative;
width:320px;
height:320px;
margin:20px auto;
}

/* BRILHO GIRANDO */

.roletaBox::before{
content:"";
position:absolute;
width:360px;
height:360px;
border-radius:50%;
background:conic-gradient(
transparent,
rgba(255,215,0,0.4),
transparent
);
animation:brilho 4s linear infinite;
top:-20px;
left:-20px;
z-index:0;
}

@keyframes brilho{
0%{transform:rotate(0deg);}
100%{transform:rotate(360deg);}
}

#wheel{
width:100%;
height:100%;
transition:transform 5.8s cubic-bezier(0.17,0.67,0.12,0.99);
transform-origin:center;
position:relative;
z-index:1;
}

.pointer{
width:0;
height:0;
border-left:15px solid transparent;
border-right:15px solid transparent;
border-top:32px solid red;
position:absolute;
top:-20px;
left:50%;
transform:translateX(-50%);
z-index:10;
}

button{
padding:14px 28px;
font-size:18px;
margin:10px 5px;
border:none;
border-radius:10px;
font-weight:bold;
cursor:pointer;
}

#giraBtn{
background:#ffd700;
color:#000;
width:100%;
}

.recargaBtn{
width:100%;
height:50px;
background:#00aa00;
color:white;
font-size:20px;
border-radius:10px;
margin:15px 0;
}

#sacarBtn{
background:#ff6600;
color:white;
display:none;
width:100%;
height:50px;
font-size:18px;
}

#resultado{
margin:20px 0;
font-size:26px;
min-height:40px;
font-weight:bold;
}

/* EXPLOSÃO DE MOEDAS */

#coinsExplosion{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
z-index:999;
}

.coin{
position:absolute;
font-size:30px;
animation:coinFall 1.8s ease-out forwards;
}

@keyframes coinFall{

0%{
transform:translateY(-100px) scale(0.5) rotate(0deg);
opacity:1;
}

100%{
transform:translateY(500px) scale(1.2) rotate(720deg);
opacity:0;
}

}

</style>

<link rel="stylesheet" href="MPayment/Styles.css">

</head>

<body>

<div id="app">

<h1>🎰 Roleta Premiada</h1>

<div id="saldoArea">

<div class="credito-box">
Créditos: R$ <span id="valorCreditos" class="credito">0.00</span>
</div>

<div class="credito-box">
Prêmios: R$ <span id="valorPremios" class="premio">0.00</span>
</div>

</div>

<div class="roletaBox">
<div class="pointer"></div>
<canvas id="wheel" width="320" height="320"></canvas>
</div>

<button id="giraBtn" onclick="girar()">GIRAR (custa R$1)</button>

<div id="resultado"></div>

<button class="recargaBtn" id="recargaPixBtn">Recarga via Pix</button>

<button id="sacarBtn" onclick="solicitarSaque()">Sacar Prêmios</button>

<button onclick="adicionar18Creditos()" style="background:#0099ff;color:white;width:100%;height:45px;">
Adicionar 18 Créditos
</button>

</div>

<div id="coinsExplosion"></div>

<script>

document.getElementById("valorCreditos").innerText = creditos.toFixed(2);

function atualizarCreditos(){

}

atualizarSaqueBtn();

function solicitarSaque(){

if(premios<=0)
return alert("Você não tem prêmios para sacar.");

alert(`Saque solicitado: R$${premios.toFixed(2)}
Entre em contato via WhatsApp para processar.`);

}

/* ADMIN */

function adicionar18Creditos(){

}
